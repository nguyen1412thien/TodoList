<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ZenTask</title>
</head>
<body>
    <script>
        const token = localStorage.getItem('token') || sessionStorage.getItem('token');
        if (token) {
            window.location.href = 'todo/';
        } else {
            window.location.href = 'auth/';
        }
    </script>
</body>
</html>
