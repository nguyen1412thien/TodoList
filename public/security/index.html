<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenTask - Bảo mật</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb', 'primary-hover': '#1d4ed8', 'primary-light': '#eff6ff',
                        main: '#111827', dark: '#374151', muted: '#9ca3af',
                        danger: '#f43f5e', 'danger-light': '#ffe4e6',
                        success: '#10b981', 'success-light': '#ecfdf5',
                        warning: '#f97316', 'warning-light': '#fff7ed'
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="app" class="container">
        <!-- Header -->
        <div class="flex items-center gap-4 mb-8">
            <button class="btn-icon btn-white card-shadow text-muted" onclick="window.location.href='../user/'">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </button>
            <h1 class="font-bold text-dark text-xl" style="font-size: 1.25rem;">Bảo mật</h1>
        </div>

        <div class="card card-shadow text-center" style="padding: 4rem 2rem;">
            <div class="bg-primary-light mx-auto mb-4 flex items-center justify-center text-primary" style="width: 4rem; height: 4rem; border-radius: 50%;">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            </div>
            <h2 class="font-bold text-dark text-xl mb-2">Tính năng đang phát triển</h2>
            <p class="text-muted text-sm">Các tùy chọn bảo mật tài khoản sẽ sớm được cập nhật trong phiên bản tiếp theo.</p>
            <button onclick="window.location.href='../user/'" class="btn btn-primary mt-6" style="padding: 0.75rem 1.5rem; border-radius: 0.75rem;">Quay lại Hồ sơ</button>
        </div>
    </div>
</body>
</html>
