version: '3.8'

services:
  # Ứng dụng ZenTask (PHP + Apache)
  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=14122005
      - DB_NAME=todolist
    depends_on:
      - db
    networks:
      - zentask-network

  # Cơ sở dữ liệu MySQL
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 14122005
      MYSQL_DATABASE: todolist
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/2_seed.sql
    networks:
      - zentask-network

networks:
  zentask-network:
    driver: bridge

volumes:
  db_data:
